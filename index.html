<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVeBox - Messagerie Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="hero-section">
        <div class="animated-bg"></div>
        <nav class="navbar glassmorphism">
            <div class="nav-brand">
                <i class="fas fa-envelope-open-text"></i>
                <span>LVeBox</span>
            </div>
            <div class="nav-links">
                <a href="login.html" class="nav-link">Connexion</a>
                <a href="register.html" class="btn-glow">Commencer</a>
            </div>
        </nav>
        
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="fade-up">
                    <span class="gradient-text">Communication</span><br>
                    d'exception
                </h1>
                <p class="fade-up delay-1">Une messagerie moderne, sécurisée et élégante pour vos échanges professionnels</p>
                <div class="hero-buttons fade-up delay-2">
                    <a href="register.html" class="btn-primary">
                        <span>Commencer gratuitement</span>
                        <i class="fas fa-arrow-right"></i>
                    </a>
                    <a href="login.html" class="btn-outline">Se connecter</a>
                </div>
            </div>
            <div class="hero-illustration float-animation">
                <i class="fas fa-envelope"></i>
                <i class="fas fa-paper-plane"></i>
                <i class="fas fa-star"></i>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <h3>100k+</h3>
                <p>Utilisateurs actifs</p>
            </div>
            <div class="stat-item">
                <h3>1M+</h3>
                <p>Messages envoyés</p>
            </div>
            <div class="stat-item">
                <h3>99.9%</h3>
                <p>Satisfaction</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
